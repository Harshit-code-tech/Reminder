name: Media Cleanup
on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: defaults
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_HOST: ${{ vars.EMAIL_HOST }}
      EMAIL_PORT: ${{ vars.EMAIL_PORT }}
      EMAIL_USE_TLS: ${{ vars.EMAIL_USE_TLS }}
      EMAIL_STARTUP_CHECK_STRICT: "false"
      EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
      EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
      REMINDER_CRON_SECRET: ${{ secrets.REMINDER_CRON_SECRET }}


    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Delete expired media and notify
        run: |
          python manage.py delete_expired_media