name: Health Check
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
jobs:
  health:
    runs-on: ubuntu-latest
    env:
      RENDER_BASE_URL: https://reminder-app-gap4.onrender.com
    steps:
      - name: Check health endpoint
        run: |
          BASE_URL="${RENDER_BASE_URL:-https://reminder-app-gap4.onrender.com}"
          echo "Checking health endpoint..."
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" --max-time 10 "${BASE_URL%/}/health/")
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Health check passed: HTTP $RESPONSE"
            cat response.json
          else
            echo "❌ Health check failed: HTTP $RESPONSE" >&2
            cat response.json
            exit 1
          fi