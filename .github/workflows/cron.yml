name: Reminder and Backup Cron

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    environment: production
    env:
      RENDER_BASE_URL: https://reminder-app-gap4.onrender.com

    steps:
      - name: Trigger reminder endpoint securely
        run: |
          BASE_URL="${RENDER_BASE_URL:-https://reminder-app-gap4.onrender.com}"
          echo "Triggering reminder cron..."
          curl --fail --silent --show-error \
               --max-time 20 \
               -X POST "${BASE_URL%/}/reminders/send-daily-reminders/" \
               --data-urlencode "token=${{ secrets.REMINDER_CRON_SECRET }}" \
               -H "Content-Type: application/x-www-form-urlencoded"
          echo "✅ Reminder trigger completed successfully."
