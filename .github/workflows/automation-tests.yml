name: Automation Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-automation:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key
      DEBUG: "False"
      DATABASE_URL: sqlite:///test_db.sqlite3
      DATABASE_SSL: "False"
      EMAIL_FROM: test@example.com
      EMAIL_HOST: smtp-relay.brevo.com
      EMAIL_PORT: "587"
      EMAIL_USE_TLS: "True"
      EMAIL_HOST_USER: test-smtp-user
      EMAIL_HOST_PASSWORD: test-smtp-pass
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_KEY: test-supabase-key
      SUPABASE_SERVICE_KEY: test-supabase-service-key
      SUPABASE_JWT_SECRET: test-supabase-jwt-secret
      REMINDER_CRON_SECRET: test-reminder-secret
      ALLOWED_HOSTS: 127.0.0.1,localhost
      CSRF_TRUSTED_ORIGINS: http://localhost

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation regression tests
        run: |
          python manage.py test core reminders
