<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Bell handle -->
  <circle cx="50" cy="18" r="5" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Bell body -->
  <path d="M22 72 Q22 60 28 48 Q34 36 50 34 Q66 36 72 48 Q78 60 78 72 Z"
        fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Bell rim -->
  <ellipse cx="50" cy="72" rx="28" ry="6" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- Clapper -->
  <circle cx="50" cy="82" r="5" fill="white"/>
  <!-- Star in bell center -->
  <polygon points="50,46 52.4,52.8 59.5,52.8 53.8,57 56.2,63.8 50,59.6 43.8,63.8 46.2,57 40.5,52.8 47.6,52.8"
           fill="white" opacity="0.9"/>
</svg>