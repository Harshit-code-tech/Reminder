{% comment %}Page 5: Anniversary — "Words From the Heart" (Love Letter + Audio){% endcomment %}

<div class="anniv-letter-scene">
  <!-- Envelope container -->
  <div class="anniv-envelope-wrap" id="anniv-envelope-wrap">
    <div class="anniv-envelope" id="anniv-envelope" tabindex="0"
         aria-label="Tap to open your love letter" role="button">
      <!-- Envelope back -->
      <div class="anniv-envelope-back"></div>
      <!-- Envelope flap (lifts on open) -->
      <div class="anniv-envelope-flap"></div>
      <!-- Wax seal -->
      <div class="anniv-envelope-seal">
        <i class="fas fa-heart"></i>
      </div>
      <!-- Envelope front -->
      <div class="anniv-envelope-front"></div>
    </div>
    <p class="anniv-envelope-hint">Tap to open your letter…</p>
  </div>

  <!-- Letter content — hidden until envelope opens -->
  <div class="anniv-letter-container hidden" id="anniv-letter-container">
    <div class="anniv-letter-paper">
      <p class="anniv-letter-greeting">My Dearest {{ event.name }},</p>
      <div class="anniv-letter-body" id="anniv-letter-body">
        {% if event.message %}
          {{ event.message|linebreaksbr }}
        {% else %}
          <span class="anniv-fallback-msg"></span>
        {% endif %}
      </div>
      <p class="anniv-letter-closing hidden" id="anniv-letter-closing">Forever yours ❤️</p>
    </div>
  </div>

  <!-- Audio player — revealed after letter opens -->
  <div class="anniv-audio-reveal hidden" id="anniv-audio-reveal">
    <!-- Populated by JS: either the user's audio player or a fallback quote -->
  </div>
</div>
