{% comment %}Page 4: Anniversary — "Moonlit Memories" (Media / Photos){% endcomment %}
{% load static %}

<h2 class="page-title anniv-p4-title">Moonlit Memories</h2>

<div class="anniv-memories-scene">
  <!-- Moonlight vignette overlay -->
  <div class="anniv-moonlight-vignette" aria-hidden="true"></div>

  <!-- Rose petal layer — JS injects sparse floating petals -->
  <div class="anniv-mem-petals" id="anniv-mem-petals" aria-hidden="true"></div>

  <!-- Media display — engine fills this via setupMediaDisplays() -->
  <div class="media-container anniv-media-container">
    <div class="media-display"
         data-media-urls="{% for media in event.media.all %}{% if media.media_type == 'image' %}{{ media.media_file|urlencode }}{% if not forloop.last %},{% endif %}{% endif %}{% endfor %}"
         data-fallback-url="{% static 'images/nature.jpg' %}"
         tabindex="0"
         role="img"
         aria-label="Anniversary memories">
    </div>
    <div class="media-caption anniv-media-caption">
      {% if event.media.exists %}
        {{ event.media.first.caption|default:"Our cherished moments together" }}
      {% else %}
        A moment inspired by nature
      {% endif %}
    </div>
  </div>

  <!-- Calming ambient sound for this page -->
  <audio id="calming-sound" loop>
    <source src="{% static 'audio/anniversary/moonlit_memories.mp3' %}" type="audio/mpeg">
  </audio>
  <button class="audio-control anniv-audio-control" aria-label="Toggle ambient sound">
    <i class="fas fa-pause"></i>
    Pause Sound
  </button>
</div>
