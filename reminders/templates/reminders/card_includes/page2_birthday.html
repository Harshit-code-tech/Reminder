{% comment %}Page 2: Birthday — Open the Gift (3-step unwrap ritual){% endcomment %}
<h2 class="page-title">A gift for you, <span class="recipient-name">{{ event.name }}</span>!</h2>

<div class="gift-ceremony-container">
  <div id="birthday-gift" class="birthday-gift" role="button" tabindex="0"
       aria-label="Birthday gift — tap to unwrap (3 steps)">

    <!-- Layer 1: Wrapping paper -->
    <div class="gift-wrapping">
      <div class="gift-wrapping-pattern"></div>
    </div>

    <!-- Layer 2: Ribbon -->
    <div class="gift-ribbon-layer">
      <div class="gift-ribbon-bow"></div>
      <div class="gift-ribbon-vertical"></div>
      <div class="gift-ribbon-horizontal"></div>
    </div>

    <!-- Layer 3: Lid -->
    <div class="gift-lid-layer">
      <div class="gift-lid-top"></div>
    </div>

    <!-- Reveal content (shown after all 3 steps) -->
    <div class="gift-reveal-content">
      <div class="gift-reveal-emoji">🎉</div>
      <p class="gift-reveal-text">Your present popped out! Head to the next page&hellip;</p>
    </div>
  </div>

  <p class="gift-step-hint" aria-live="polite">Tap to unwrap the ribbon!</p>
  <span class="gift-aria-live" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);"></span>

  <button id="birthday-gift-continue" class="action-button hidden" aria-label="Continue to next page">
    <i class="fas fa-arrow-right"></i>
    Continue
  </button>
</div>
