{% extends 'base.html' %}

{% block title %}Enter Share Password | Reminder{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            </div>
            <h2 class="auth-title">Share Link Protected</h2>
            <p class="auth-subtitle">This card was shared with a password. Please enter it to continue.</p>
        </div>

        {% if error %}
        <div class="auth-alert auth-alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ action_url }}" class="auth-form">
            {% csrf_token %}
            <div class="auth-field">
                <label for="password" class="auth-label">Share Password</label>
                <div class="auth-input-wrap">
                    <span class="auth-input-icon">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </span>
                    <input type="password" name="password" id="password" required autofocus placeholder="Enter password">
                </div>
            </div>
            <button type="submit" class="auth-submit">Access Card</button>
        </form>
    </div>
</div>
<style>
    .auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 200px);padding:2rem 1rem}
    .auth-card{width:100%;max-width:420px;background:var(--card-bg-light);border-radius:20px;padding:2.5rem;box-shadow:0 8px 40px rgba(99,102,241,0.08);border:1px solid rgba(139,92,246,0.08)}
    body.dark-mode .auth-card{background:var(--card-bg-dark);box-shadow:0 8px 40px rgba(0,0,0,0.25);border-color:rgba(139,92,246,0.12)}
    .auth-header{text-align:center;margin-bottom:2rem}
    .auth-icon{width:56px;height:56px;margin:0 auto;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(99,102,241,0.3)}
    .auth-title{margin-top:1rem;font-size:1.5rem;font-weight:700;color:#111827}
    body.dark-mode .auth-title{color:#f8fafc}
    .auth-subtitle{font-size:0.875rem;color:#6b7280;margin-top:0.35rem}
    body.dark-mode .auth-subtitle{color:#94a3b8}
    .auth-form{display:flex;flex-direction:column;gap:1rem}
    .auth-label{display:block;font-size:0.875rem;font-weight:600;color:#374151;margin-bottom:0.35rem}
    body.dark-mode .auth-label{color:#cbd5e1}
    .auth-input-wrap{position:relative}
    .auth-input-icon{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:#9ca3af}
    body.dark-mode .auth-input-icon{color:#94a3b8}
    .auth-input-wrap input{width:100%;padding:0.72rem 0.9rem 0.72rem 2.6rem;border-radius:12px;border:1px solid rgba(99,102,241,0.18);outline:none;background:rgba(255,255,255,0.85);font-size:0.92rem;color:#111827}
    .auth-input-wrap input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
    body.dark-mode .auth-input-wrap input{background:rgba(15,23,42,0.65);border-color:rgba(139,92,246,0.2);color:#f8fafc}
    .auth-alert{padding:10px 14px;border-radius:10px;font-size:0.85rem;font-weight:500;margin-bottom:8px}
    .auth-alert-error{background:rgba(239,68,68,0.08);color:#dc2626;border:1px solid rgba(239,68,68,0.15)}
    body.dark-mode .auth-alert-error{color:#fca5a5;background:rgba(239,68,68,0.12)}
    .auth-submit{display:flex;align-items:center;justify-content:center;width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-weight:600;font-size:0.95rem;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.25s ease;box-shadow:0 4px 16px rgba(99,102,241,0.25)}
    .auth-submit:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,0.35);background:linear-gradient(135deg,#4f46e5,#7c3aed)}
    .auth-submit:active{transform:translateY(0)}
    @media(max-width:480px){.auth-card{padding:1.75rem 1.5rem}}
</style>
{% endblock %}
