{% extends 'base.html' %}

{% block title %}Delete Event | Reminder{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" style="max-width:480px;text-align:center">
        <div class="auth-header">
            <div class="del-icon-ring">
                <svg class="w-10 h-10" style="color:#ef4444" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white mt-4">Delete event?</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">This action cannot be undone</p>
        </div>

        <div style="padding:1rem 1.25rem;border-radius:12px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.12);margin-bottom:1.5rem">
            <p class="text-lg font-semibold" style="color:#ef4444">"{{ event.name }}"</p>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">All data associated with this event will be permanently removed.</p>
        </div>

        <form method="post" class="flex flex-col sm:flex-row justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'event_list' %}" class="del-cancel-btn">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Cancel
            </a>
            <button type="submit" class="del-confirm-btn">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Delete Event
            </button>
        </form>
    </div>
</div>

<style>
    .auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 200px);padding:2rem 1rem}
    .auth-card{width:100%;background:var(--card-bg-light);border-radius:20px;padding:2.5rem;box-shadow:0 8px 40px rgba(99,102,241,0.08);border:1px solid rgba(139,92,246,0.08)}
    body.dark-mode .auth-card{background:var(--card-bg-dark);box-shadow:0 8px 40px rgba(0,0,0,0.25);border-color:rgba(139,92,246,0.12)}
    .auth-header{text-align:center;margin-bottom:1.5rem}
    .del-icon-ring{width:72px;height:72px;margin:0 auto;border-radius:50%;background:rgba(239,68,68,0.08);display:flex;align-items:center;justify-content:center}
    body.dark-mode .del-icon-ring{background:rgba(239,68,68,0.12)}
    .del-cancel-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:12px;font-weight:600;font-size:0.875rem;text-decoration:none;background:rgba(99,102,241,0.06);color:#4b5563;border:1px solid rgba(99,102,241,0.12);transition:all 0.2s}
    .del-cancel-btn:hover{background:rgba(99,102,241,0.1);transform:translateY(-1px)}
    body.dark-mode .del-cancel-btn{color:#94a3b8;border-color:rgba(139,92,246,0.15);background:rgba(139,92,246,0.06)}
    .del-confirm-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:12px;font-weight:600;font-size:0.875rem;border:none;cursor:pointer;background:linear-gradient(135deg,#ef4444,#dc2626);color:white;box-shadow:0 4px 16px rgba(239,68,68,0.25);transition:all 0.25s ease}
    .del-confirm-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(239,68,68,0.35);filter:brightness(1.05)}
    .del-confirm-btn:active{transform:translateY(0)}
    @media(max-width:480px){.auth-card{padding:1.75rem 1.5rem}}
</style>
{% endblock %}
