{% extends 'base.html' %}

{% block title %}Enter Card Password: Reminder{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon" style="background:linear-gradient(135deg,#8b5cf6,#a855f7)">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <h2 class="auth-title">Password Required</h2>
            <p class="auth-subtitle">This greeting card is password-protected. Please enter the password to view it.</p>
        </div>

        {% if error %}
        <div class="auth-alert auth-alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="auth-field">
                <label for="password" class="auth-label">Enter Password</label>
                <div class="auth-input-wrap">
                    <span class="auth-input-icon">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </span>
                    <input type="password" name="password" id="password" required autofocus placeholder="Enter password">
                </div>
            </div>
            <button type="submit" class="auth-submit">View Card</button>
        </form>
    </div>
</div>
{% endblock %}
{% endblock %}
